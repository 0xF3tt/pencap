name: Release

on:
  push:
    tags:
      - "v*"

# Least-privilege default; the release job elevates only what it needs.
permissions:
  contents: read

jobs:
  release:
    name: build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the GitHub Release and upload assets
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history/tags so `git describe` resolves the pushed tag
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: true

      - name: Install lint/audit/build tooling
        run: |
          go install mvdan.cc/garble@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest
          install-only: true

      - name: Build release artifacts (runs test + lint + audit gates first)
        run: make release

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
